name: Daily recruitment update

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: offerfree-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Collect public recruitment listings
        run: node scripts/update-jobs.mjs
      - name: Publish changed data
        run: |
          git config user.name "offerfree-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add daily-jobs.json
          if git diff --cached --quiet; then
            echo "No recruitment data changes"
          else
            git commit -m "Daily recruitment update $(date -u +%F)"
            git push
          fi
